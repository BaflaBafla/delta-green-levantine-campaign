<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3508" height="2480" viewBox="0 0 3508 2480">
  <style>
    .bg { fill:#ffffff }
    .tab { fill:#f5f5f5; stroke:#c0c0c0; stroke-width:6 }
    .header { font-family: Arial, Helvetica, sans-serif; font-size:64px; fill:#222 }
    .sub { font-family: Arial, Helvetica, sans-serif; font-size:44px; fill:#333 }
    .panel-title { font-family: Arial, Helvetica, sans-serif; font-size:48px; fill:#fff }
    .tab1 { fill:#e0e0e0 }
    .tab2 { fill:#d32f2f }
    .tab3 { fill:#1976d2 }
    .tab4 { fill:#212121 }
    .box { fill:#ffffff; stroke:#ddd; stroke-width:4 }
    .note { font-family: Arial; font-size:36px; fill:#444 }
  </style>

  <rect class="bg" x="0" y="0" width="3508" height="2480" />

  <!-- Four header tabs -->
  <rect class="tab tab1" x="50" y="50" width="820" height="220" rx="12"/>
  <text x="120" y="160" class="panel-title">WORLD NEWS</text>

  <rect class="tab tab2" x="890" y="50" width="820" height="220" rx="12"/>
  <text x="960" y="160" class="panel-title">LOCAL FRICTION</text>

  <rect class="tab tab3" x="1730" y="50" width="820" height="220" rx="12"/>
  <text x="1790" y="160" class="panel-title">COVER STORY</text>

  <rect class="tab tab4" x="2570" y="50" width="820" height="220" rx="12"/>
  <text x="2660" y="160" class="panel-title">THE STATIC</text>

  <!-- Four content panels -->
  <rect class="box" x="50" y="300" width="1640" height="2000" rx="12"/>
  <text x="110" y="380" class="header">HAARETZ · June 2026</text>
  <text x="110" y="460" class="note">• Ceasefire talks collapse in Cairo</text>
  <text x="110" y="510" class="note">• UN Security Council emergency</text>
  <text x="110" y="560" class="note">• Extreme heat / water infrastructure strain</text>

  <rect class="box" x="1710" y="300" width="1640" height="2000" rx="12"/>
  <text x="1770" y="380" class="header">Four-tab briefing: use this as an A4 landscape handout.</text>
  <text x="1770" y="460" class="note">Panel top-left: World News (neutral geopolitical context)</text>
  <text x="1770" y="510" class="note">Panel top-right: Local Friction (detailed intel)</text>
  <text x="1770" y="560" class="note">Panel bottom-left: Cover Story (how media reported last mission)</text>
  <text x="1770" y="610" class="note">Panel bottom-right: The Static (hand to players last; unsettling detail)</text>

  <!-- Footer note -->
  <text x="110" y="2380" class="note">Print at A4 landscape (3508×2480px @300dpi) or export as PNG for VTT. Replace content lines with session-specific headlines.</text>
</svg>
